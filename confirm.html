<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Confirmation</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #abff9a, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .confirm-box {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
        animation: pop 0.5s ease-in-out;
    }

    .confirm-box h1 {
        color: green;
        font-size: 32px;
        margin-bottom: 10px;
    }

    .confirm-box p {
        font-size: 18px;
        color: #555;
    }

    .confirm-box button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        background: #4340ff;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    .confirm-box button:hover {
        background: #1ee939;
    }

    @keyframes pop {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    
</style>
</head>
<body>

<div class="confirm-box"   >
    <a href="home.html">
    <button>Back to Home</button>
</a>
    <h1>✅ Order Confirmed!</h1>
    <p>Thank you for booking with Natural Beauty Parlour 💄✨</p>
    <!-- <button  type="button" class="btn" onclick="goHome()">Back to Home</button> -->
</div>

<script>
function goHome() {
    Window.location.href = "./index.html"; 
}
</script>

</body>
</html>
